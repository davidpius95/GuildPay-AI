# Local dev dependencies for GuildPay AI (Week 0).
#
# Database (Postgres) + Storage + Auth come from SUPABASE, not this file:
#   • Local:  install the Supabase CLI and run `supabase start`
#             (gives Postgres on :54322, Studio/API on :54321).
#   • Or point DATABASE_URL / SUPABASE_URL at the self-hosted Supabase on Guild Server.
# This file only runs Redis (Supabase provides no cache/session store).
#
# Start with:  docker compose up -d
services:
  redis:
    image: redis:7-alpine
    container_name: guildpay-redis
    ports:
      - "6379:6379"
    volumes:
      - guildpay-redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  guildpay-redisdata:
